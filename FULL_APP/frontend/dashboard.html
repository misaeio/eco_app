<!DOCTYPE html>
<html lang="en"> <!-- englsih --> 
<head>
    <meta charset="UTF-8">
    <title>Eco App Dashboard</title> 
    <link rel="stylesheet" href="style.css"> <!-- styles it w css -->
</head>
<body>
    <h1>Eco App Dashboard</h1> <!-- sets browser tab title to ECO APP DASHBOARD -->
    <p id="welcome"></p>

    <h2>Add a Task</h2> <!-- 2nd header says add a task -->
    <input type="text" id="new-task" placeholder="New Task"> <!-- ninput field for adding new task -->
    <button onclick="addTask()">Add Task</button> <!-- calls addTask() from dashboard.js -->

    <h2>Your Tasks</h2>  <!-- 2nd header says your task -->
    <ul id="tasks-list"></ul> <!-- sets tasks in an unordered list -->

    <script src="dashboard.js"></script> <!-- uses dashboard.js --> 
</body>
</html>
