<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco App | Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-card">
    <h1>Eco App</h1>
        <p class="tagline" id="eco-fact"></p>
        <div class="form-section">
    <h2>Login</h2>

    <input 
    type="password" 
    id="login-password" 
    placeholder="Password"
    autocomplete="current-password"
    required>
    <button type="button" onclick="login()">Login</button>
    <br>
    <br>
   <a id="signup" href="signup.html">Sign Up Here!</a>
   <br>
   <br>
   <a id="forgotpass" href="forgotpass.html">Forgot Password?</a>
     </div>
     </div>
    <script src="app.js"></script>
</body>
</html>
