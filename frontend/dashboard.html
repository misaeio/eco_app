<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eco App Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">

    <style>
        .tab { display: none; }
        .tab.active { display: block; }
        .tab-buttons button { margin-right: 5px; }

        .post {
            background: white;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            width: 320px;
        }

        .post img {
            max-width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h1>Eco App Dashboard</h1>
<p id="welcome"></p>

<div class="tab-buttons">
    <button onclick="showTab('home')">Home Feed</button>
    <button onclick="showTab('recycling')">Search Local Recycling</button>
    <button onclick="openMyProfile()">Profile</button>
</div>

<!-- HOME -->
<div id="home" class="tab active">
    <h2>Community Feed</h2>

    <input id="new-post" placeholder="What did you do?">
    <input id="new-image" placeholder="Image URL">
    <button id="post-btn">Post</button>

    <div id="feed"></div>
</div>

<!-- RECYCLING  -->
<div id="recycling" class="tab">
    <h2>♻️ Find Local Recycling Centers</h2>

    <div class="search-box">
        <label for="zipCode" style="display: block; margin-bottom: 10px; font-weight: bold;">Enter your ZIP code:</label>
        <input type="text" id="zipCode" placeholder="e.g., 90210" maxlength="5">
        <button onclick="searchRecyclingCenters()">Search Within 20 Miles</button>
    </div>

    <div id="recycling-results"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="tab">

    <h2>Profile</h2>

    <!-- DISPLAY -->
    <img id="profile-pic-display" width="80" height="80" style="border-radius:50%;">
    <h3 id="profile-username-display"></h3>
    <p id="profile-bio-display"></p>

    <p id="followers">Followers: 0</p>
    <p id="following">Following: 0</p>
    <button id="follow-btn" style="display:none;"></button>

    <hr>

    <!-- EDIT SECTION -->
    <div id="edit-section">
        <h3>Edit Profile</h3>

        <input id="profile-username" placeholder="Username">
        <input id="profile-bio" placeholder="Bio">
        <input id="profile-pic" placeholder="Profile Picture URL">

        <button onclick="saveProfile()">Save</button>
    </div>



</div>

<script src="dashboard.js"></script>

</body>
</html>
