<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco App | Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="welcome-card">
        <h1>Eco App</h1>
        <div class="form-section">
            <h2>Reset Your Password</h2>
            <p id="resetpass">Enter a new password of at least 6 characters</p>
            <input type="password" id="new-password" placeholder="New Password" autocomplete="new-password">
            <input type="password" id="confirm-password" placeholder="Confirm Password" autocomplete="new-password">

            <button type="button" onclick="resetPassword()">Update Password</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
